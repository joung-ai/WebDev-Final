<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Houses</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Forum&display=swap" rel="stylesheet">

</head>

<body class="properties">

<!-- NAVBAR -->
<nav>

  <div class="nav-left">

    <img src="images/logo.jpg" class="logo">

    <span>YM Realty</span>

  </div>

  <ul>

    <li><a href="index.html" class="btn nav-btn">Home</a></li>

    <li><a href="about.html" class="btn nav-btn">About</a></li>

    <li><a href="properties.html" class="btn nav-btn">Properties</a></li>

    <li><a href="contact.html" class="btn nav-btn">Contact</a></li>

  </ul>

</nav>

<!-- HERO -->
<section class="property-hero">

  <div class="about-hero-text">

    <h1>Houses</h1>

    <p>Find your perfect dream home</p>

  </div>

</section>

<!-- MAIN -->
<section class="houses-page">

  <div class="houses-container">

    <h2 class="standard-h2">
      Houses for Sale
    </h2>

    <div class="cards" id="houses-container"></div>

  </div>

</section>

<script>

const properties = [

  {
    title: "Brand New House and Lot",
    location: "Southpoint Subdivision, Santa Rosa",
    image: "images/House_1_1.jpg",
    type: "house"
  },

  {
    title: "Modern Industrial House and Lot",
    location: "Parkplace Village, Imus Cavite",
    image: "images/House_2_1.jpg",
    type: "house"
  },

  {
    title: "House and Lot with Swimming Pool",
    location: "Park Ridge Estate",
    image: "images/House_3_1.jpg",
    type: "house"
  },

  {
    title: "Fully Furnished Smart Home",
    location: "Mission Hills, Havila Antipolo Rizal",
    image: "images/House_4_1.jpg",
    type: "house"
  },

  {
    title: "House and Lot in Loyola Grand Villas",
    location: "Loyola Grand Villas, Quezon City",
    image: "images/House_5_1.jpg",
    type: "house"
  },

  {
    title: "Astounding House and Lot",
    location: "Tierra Pura, Quezon City",
    image: "images/House_6_1.jpg",
    type: "house"
  }

];

const container =
document.getElementById("houses-container");

properties.forEach((property, index) => {

  if(property.type === "house"){

    container.innerHTML += `

      <div class="card">

        <img src="${property.image}">

        <div class="card-overlay">

          <h3>${property.title}</h3>

          <p>${property.location}</p>

          <a href="details.html?id=${index}" class="btn">
            View Details
          </a>

        </div>

      </div>

    `;
  }

});

</script>

</body>
</html>
